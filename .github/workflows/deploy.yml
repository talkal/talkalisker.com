name: Deploy Talkalisker Website & Portals

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd _dhs
          npm ci

      - name: Build DHS Portals
        run: |
          cd _dhs
          npm run build

      - name: Package Website
        run: |
          mkdir _site
          # Copy everything except source folders, git metadata, and the new _site folder
          rsync -av --exclude='_site' --exclude='.git' --exclude='.github' --exclude='_dhs' --exclude='source_reports' --exclude='scratch' --exclude='.obsidian' ./ ./_site/
          # Remove .gitignore from _site so it doesn't block the clients/ directory during gh-pages deployment
          rm -f _site/.gitignore

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
