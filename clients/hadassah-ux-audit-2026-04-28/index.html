    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Synchronized with talkalisker.com/developer-services */
            --bg-core: #111111;
            --bg-surface: #1A1A1A;
            --accent: #B85A44;
            --accent-red: #FF3B30;
            --text-primary: #FFFFFF;
            --text-secondary: #A1A1A1;
            --border-subtle: rgba(255, 255, 255, 0.05);
            --font-main: 'Outfit', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        [data-theme="light"] {
            --bg-core: #FAF8F5;
            --bg-surface: #EFECE5;
            --text-primary: #2C2A28;
            --text-secondary: #6F6B66;
            --border-subtle: rgba(44, 42, 40, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg-core); 
            color: var(--text-primary); 
            font-family: var(--font-main);
            display: flex;
            min-height: 100vh;
        }

        [lang="he"] { direction: rtl; }
        [lang="he"] .sidebar { border-right: none; border-left: 1px solid var(--border-subtle); }
        [lang="he"] .nav-link.active { border-right: none; border-left: 2px solid var(--accent); }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background: var(--bg-surface);
            border-right: 1px solid var(--border-subtle);
            padding: 3rem 2rem;
            height: 100vh;
            position: sticky;
            top: 0;
            display: flex;
            flex-direction: column;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 3rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .logo img { width: 32px; border-radius: 50%; background: white; padding: 2px; }

        .nav-link {
            display: block;
            padding: 0.8rem 0;
            color: var(--text-secondary);
            text-decoration: none;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            transition: color 0.2s;
        }

        .nav-link:hover { color: var(--accent); }
        .nav-link.active { color: var(--accent); border-right: 2px solid var(--accent); }

        /* Main Content */
        .main {
            flex: 1;
            padding: 4rem 10% 8rem 10%;
            max-width: 1200px;
        }

        .report-header { margin-bottom: 6rem; }
        .report-label { color: var(--accent); font-family: var(--font-mono); font-size: 0.85rem; margin-bottom: 1rem; }
        .report-title { font-size: 3.5rem; font-weight: 800; line-height: 1.1; margin-bottom: 1rem; }
        .report-client { color: var(--accent); font-family: var(--font-mono); font-size: 1.2rem; }

        section { padding: 4rem 0; border-top: 1px solid var(--border-subtle); }
        h1, h2 { margin-bottom: 2rem; }
        p { line-height: 1.8; color: var(--text-secondary); margin-bottom: 1.5rem; font-size: 1.1rem; }

        /* Findings Card */
        .finding-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .finding-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-family: var(--font-mono);
            font-size: 0.8rem;
        }

        .severity { padding: 0.2rem 0.6rem; border-radius: 4px; font-weight: 700; text-transform: uppercase; }
        .sev-high { background: rgba(255, 59, 48, 0.1); color: var(--accent-red); }
        .sev-medium { background: rgba(255, 159, 10, 0.1); color: #FF9F0A; }
        .sev-low { background: rgba(107, 142, 35, 0.1); color: #6B8E23; }

        /* Proposal Card (Naming Strategy) */
        .proposal-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 3rem;
            margin: 3rem 0;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .proposal-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; height: 100%; width: 4px;
            background: var(--accent);
        }
        .proposal-name {
            font-size: 3.2rem;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
            line-height: 1;
        }
        .proposal-slogan {
            font-family: var(--font-mono);
            font-style: italic;
            font-size: 1.1rem;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
            opacity: 0.8;
        }
        .proposal-desc {
            font-size: 1.05rem;
            line-height: 1.6;
            color: var(--text-secondary);
        }
        .proposal-badge {
            position: absolute;
            top: 3rem; right: 3rem;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            background: rgba(184, 90, 68, 0.1);
            color: var(--accent);
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
        }

        /* Decision Cards (Meeting Summaries) */
        .decision-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-left: 3px solid var(--text-primary);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .decision-meta {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.8rem;
            display: flex;
            justify-content: space-between;
        }
        .decision-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        /* Action Items (Meeting Summaries) */
        .action-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-subtle);
            border-radius: 6px;
            padding: 1rem 1.5rem;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .action-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .action-checkbox {
            width: 18px; height: 18px;
            border: 2px solid var(--accent);
            border-radius: 3px;
        }
        .action-title {
            font-weight: 600;
        }
        .action-owner {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            background: rgba(255,255,255,0.05);
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            color: var(--text-secondary);
        }
        .action-status {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
        }
        .status-pending { color: #FF9F0A; }
        .status-blocked { color: var(--accent-red); }
        .status-done { color: #6B8E23; }

        /* Metric & Ranking Cards (Retainers / SEO) */
        .metric-card, .ranking-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            display: grid;
            grid-template-columns: 1fr 150px 150px;
            gap: 1.5rem;
            align-items: center;
        }
        .metric-title, .ranking-keyword { font-weight: 700; font-size: 1.1rem; }
        .metric-value, .ranking-position { font-family: var(--font-mono); font-size: 1.5rem; color: var(--accent); text-align: center; }
        .metric-trend, .ranking-change { font-family: var(--font-mono); font-size: 0.85rem; text-align: right; }
        .trend-up { color: #6B8E23; }
        .trend-down { color: var(--accent-red); }
        .trend-neutral { color: var(--text-secondary); }

        /* Color Swatches (Project Handoff) */
        .swatch-card {
            display: flex;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 1rem;
        }
        .swatch-color { width: 100px; flex-shrink: 0; }
        .swatch-info { padding: 1.5rem; }
        .swatch-name { font-weight: 700; font-size: 1.2rem; margin-bottom: 0.5rem; }
        .swatch-hex { font-family: var(--font-mono); color: var(--accent); font-size: 0.9rem; margin-bottom: 0.5rem; }
        .swatch-usage { color: var(--text-secondary); font-size: 0.9rem; }

        /* Signature Cards */
        .signature-card {
            margin-top: 5rem;
            min-width: 260px;
            display: inline-block;
            margin-right: 5rem;
        }
        .signature-line {
            height: 1px;
            background: var(--text-primary);
            opacity: 0.15;
            margin-bottom: 1.25rem;
            width: 100%;
        }
        .signature-name {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }
        .signature-role {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        /* Deliverable Cards */
        .deliverable-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            display: flex;
            gap: 1.5rem;
            align-items: flex-start;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.3s;
        }
        .deliverable-card:hover {
            border-color: var(--accent);
            transform: translateX(4px);
            box-shadow: 0 10px 30px var(--accent-glow);
        }
        .deliverable-icon {
            color: var(--accent);
            flex-shrink: 0;
            margin-top: 0.25rem;
        }
        .deliverable-title {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }
        .deliverable-details {
            font-size: 1.05rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* Images & Evidence */
        .evidence-img {
            max-width: 100%;
            max-height: 500px;
            object-fit: contain;
            border-radius: 12px;
            border: 1px solid var(--border-subtle);
            margin: 2rem 0 1rem 0;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }
        .evidence-img:hover { transform: scale(1.02); }
        .img-caption {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 2.5rem;
        }

        /* Lightbox Overlay */
        .lightbox-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: zoom-out;
        }
        .lightbox-overlay img { max-width: 90%; max-height: 90%; border-radius: 4px; }

        @media print {
            .sidebar { display: none; }
            .main { padding: 0; max-width: 100%; }
            body { background: white; color: black; }
            .finding-card { page-break-inside: avoid; border: 1px solid #eee; }
        }

        @media (max-width: 900px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: relative; }
        }
    </style>
</head>

    <div id="lightbox" class="lightbox-overlay" onclick="closeLightbox()">
        <img id="lightbox-img" src="" alt="Zoomed Evidence">
    </div>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const target = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', target);
            localStorage.setItem('theme', target);
            updateIcons(target);
        }

        function updateIcons(theme) {
            document.getElementById('sun-icon').style.display = theme === 'light' ? 'block' : 'none';
            document.getElementById('moon-icon').style.display = theme === 'dark' ? 'block' : 'none';
        }

        function toggleLang() {
            const html = document.documentElement;
            const available = JSON.parse(html.getAttribute('data-languages') || '["en"]');
            if (available.length < 2) return;

            const current = html.getAttribute('lang') || 'en';
            const nextIndex = (available.indexOf(current) + 1) % available.length;
            const next = available[nextIndex];
            
            setLang(next);
        }

        function setLang(lang) {
            const html = document.documentElement;
            html.setAttribute('lang', lang);
            localStorage.setItem('language', lang);
            
            document.querySelectorAll('.lang-block, .lang-nav').forEach(b => {
                b.style.display = b.getAttribute('lang') === lang ? 'block' : 'none';
            });
        }

        function openLightbox(src) {
            const lb = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            img.src = src;
            lb.style.display = 'flex';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }

        function attemptDecrypt() {
            const key = document.getElementById('auth-key').value;
            const payloadRaw = document.getElementById('encrypted-payload').textContent;
            // The template injects quotes around the string, so slice them off
            const ciphertext = payloadRaw.slice(1, -1);
            
            try {
                const bytes = CryptoJS.AES.decrypt(ciphertext, key);
                const decryptedStr = bytes.toString(CryptoJS.enc.Utf8);
                if (!decryptedStr) throw new Error("Decryption returned empty");
                
                const payload = JSON.parse(decryptedStr);
                
                // Hide lock screen
                document.getElementById('lock-screen').style.display = 'none';
                
                // Inject decrypted DOM
                document.getElementById('sidebar-nav').innerHTML = `
                    <div class="lang-nav" lang="en">${payload.nav_en}</div>
                    <div class="lang-nav" lang="es" style="display: none;">${payload.nav_es}</div>
                    <div class="lang-nav" lang="he" style="display: none;">${payload.nav_he}</div>
                `;
                document.getElementById('decrypted-content').innerHTML = `
                    <div class="lang-block" lang="en">${payload.content_en}</div>
                    <div class="lang-block" lang="es" style="display: none;">${payload.content_es}</div>
                    <div class="lang-block" lang="he" style="display: none;">${payload.content_he}</div>
                `;
                document.getElementById('decrypted-content').style.display = 'block';

                // Re-bind listeners for fresh DOM
                document.querySelectorAll('.evidence-img').forEach(img => {
                    img.onclick = () => openLightbox(img.src);
                });
                
                const html = document.documentElement;
                const savedLang = localStorage.getItem('language') || 'en';
                setLang(savedLang);

            } catch (e) {
                document.getElementById('auth-error').style.display = 'block';
                document.getElementById('auth-key').value = '';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const html = document.documentElement;
            
            // Theme Init
            const savedTheme = localStorage.getItem('theme') || 'dark';
            html.setAttribute('data-theme', savedTheme);
            updateIcons(savedTheme);

            // Lang Init
            const available = JSON.parse(html.getAttribute('data-languages') || '["en"]');
            if (available.length > 1) {
                document.getElementById('lang-toggle').style.display = 'flex';
                document.getElementById('lang-toggle').onclick = toggleLang;
                const savedLang = localStorage.getItem('language') || available[0];
                setLang(available.includes(savedLang) ? savedLang : available[0]);
            }

            document.querySelectorAll('.evidence-img').forEach(img => {
                img.onclick = () => openLightbox(img.src);
            });
        });
    </script>
</body>
</html>
